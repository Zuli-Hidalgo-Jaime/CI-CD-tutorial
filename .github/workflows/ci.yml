name: Create Dev Environment

on:
  push:
    branches:
      - main

jobs:
  create-environment:
    runs-on: ubuntu-latest
    environment: Dev

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Instalar extensión DevCenter
        run: az extension add --name devcenter --yes

      - name: Validar login
        run: az account show
